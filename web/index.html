  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- Status bar đồng bộ với theme dark mode -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Safari iOS UI Optimization: Loại bỏ Overscroll, disable double tap, vô hiệu hóa highlight -->
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0F172A; /* Nền Dark Mode khớp trạng thái */
      overflow: hidden; /* Vô hiệu hoá cuộn cao su (Overscroll) */
      overscroll-behavior-y: none; /* CSS chuẩn ngăn overscroll */
      -webkit-touch-callout: none; /* Tắt menu hệ thống khi nhấn giữ */
      -webkit-user-select: none; /* Tắt highlight chữ không mong muốn */
      user-select: none;
    }
  </style>
